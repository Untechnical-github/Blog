name: AI Proofreader (Run All Files)

on:
  workflow_dispatch:

jobs:
  proofread-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai

      - name: Run AI Proofreader on ALL files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |

          find articles -type f \( -name "*.html" -o -name "*.md" \) | while read file; do
            echo "Running AI on $file..."
            node script/ai-proofreader.mjs "$file"
            
            sleep 10
          done

      - name: Save AI suggestion to temporary branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b ai-review-branch
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "🤖 AIによる全記事の校正案（一括チェック）"
            git push -f origin ai-review-branch
          else
            echo "No changes needed by AI."
          fi