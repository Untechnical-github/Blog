name: AI Proofreader

on:
  push:
    paths:
      - 'articles/**/*.html'
      - 'articles/**/*.md'
    branches:
      - main

jobs:
  proofread:
    # Discord上の「反映する」ボタンはGITHUB_PATで /merges を叩いてmainにpushする。
    # GITHUB_TOKENと違いPATは再帰防止が効かないため、そのマージがこのワークフローを
    # 再発火させ、直った誤字に対して無駄にGeminiを呼んでしまう。そのマージ専用のマーカーで弾く。
    if: "!contains(github.event.head_commit.message, '[skip-proofread]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            articles/**/*.html
            articles/**/*.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install @google/generative-ai jsdom

      - name: Filter meaningful changes
        id: filter_changes
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          FILTERED=$(node script/filter-meaningful-diff.js ${{ steps.changed-files.outputs.all_changed_files }})
          echo "filtered_files=$FILTERED" >> $GITHUB_ENV
          echo "🔍 Meaningful changes (AI): $FILTERED"

      - name: Run AI Proofreader
        if: env.filtered_files != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          for file in ${{ env.filtered_files }}; do
            echo "Running AI on $file..."
            node script/ai-proofreader.mjs "$file"
          done