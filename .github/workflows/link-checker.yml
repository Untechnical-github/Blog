name: Broken Link Checker

on:
  schedule:
    # 毎日 UTC 0:00 (日本時間 9:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行を可能にする

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 既存の package.json に従って、必要なパッケージがあればインストールする
      # （今回は必須ではありませんが、今後jsdomなどを使う場合に備えて残しておくと安心です）
      - name: Install dependencies
        run: npm install

      - name: Run script
        env:
          IFTTT_KEY: ${{ secrets.IFTTT_KEY }}
        # ↓ここを変更しました！ ルートディレクトリからの相対パスを指定します
        run: node script/link-checker.mjs