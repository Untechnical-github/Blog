name: Apply AI Fix

on:
  repository_dispatch:
    types: [apply_ai_fix] # Cloudflareからの「apply_ai_fix」という合言葉に反応する

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Merge AI fixes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 仮保管庫（ai-review-branch）から本番（main）へ修正を合体させる
          git fetch origin ai-review-branch
          git merge origin/ai-review-branch --no-edit
          git push origin main