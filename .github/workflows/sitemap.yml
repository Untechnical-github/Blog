name: Auto Update Sitemap & Articles JSON

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate sitemap.xml
        run: node generate-sitemap.js

      - name: Generate articles.json
        run: node generate-articles.js

      - name: Generate rss.xml
        run: node generate-rss.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml articles.json rss.xml
          git commit -m "Auto-update sitemap, articles, and RSS" || echo "No changes to commit"
          git push
