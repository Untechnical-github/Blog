name: Auto Update Sitemap & Articles

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # ✅ 全コミット履歴を取得（複数HTML更新対応）

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate sitemap.xml
        run: node generate-sitemap.js

      - name: Generate articles.json
        run: node generate-articles.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml articles.json **/*.html   # ✅ HTMLファイルもコミット対象に追加
          git commit -m "Auto-update Sitemap, Articles, and HTML dates" || echo "No changes to commit"
          git push