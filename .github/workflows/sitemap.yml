name: Auto Update Sitemap & Articles JSON

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate sitemap with lastmod (updated files only)
        run: node generate-sitemap.js

      - name: Generate articles.json
        run: node generate-articles-json.js

      - name: Commit articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git commit -m "Auto-update articles.json" || echo "No changes to commit"
          git push

