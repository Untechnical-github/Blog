name: Auto Update Sitemap & Articles

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install jsdom

      - name: Get changed files
        id: changed_files
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.html' '*.md' | tr '\n' ' ')
          echo "raw_files=$CHANGED" >> $GITHUB_ENV
          echo "📂 Raw changed files: $CHANGED"

      - name: Filter meaningful changes
        id: filter_changes
        if: env.raw_files != ''
        run: |
          FILTERED=$(node script/filter-meaningful-diff.js ${{ env.raw_files }})
          echo "filtered_files=$FILTERED" >> $GITHUB_ENV
          echo "🔍 Meaningful changes (Sitemap/Articles): $FILTERED"

      - name: Generate sitemap.xml
        if: env.filtered_files != ''
        run: node script/generate-sitemap.js ${{ env.filtered_files }}

      - name: Generate articles.json
        if: env.filtered_files != ''
        run: node script/generate-articles.js ${{ env.filtered_files }}

      - name: Sync 404.html from index.html
        run: cp index.html 404.html

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sitemap.xml articles.json search-index.json redirect-map.json 404.html ${{ env.filtered_files }}

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update Sitemap, Articles, and HTML dates"
            git push
          else
            echo "No changes to commit"
          fi