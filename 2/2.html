nav ul {

/* 親見出し（li1） */

/* 子メニュー（小見出しリスト） */

  display: none;
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);

  border-radius: 8px;

  z-index: 10;

  display: block;
}

<script>
  async function fetchOGData(url, anchorElement) {
    try {
      const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
      const { data, status } = await response.json();

      if (status === "success") {
        if (data.title) {
          const titleElem = document.createElement("div");
          titleElem.textContent = data.title;
          titleElem.style.fontWeight = "bold";
          anchorElement.appendChild(titleElem);
        }

        if (data.image?.url) {
          const img = document.createElement("img");
          img.src = data.image.url;
          img.alt = "Preview";
          img.width = 200;
          anchorElement.appendChild(img);
        }

        if (data.description) {
          const descElem = document.createElement("div");
          descElem.textContent = data.description;
          anchorElement.appendChild(descElem);
        }
      }
    } catch (error) {
      console.error("OGP情報の取得に失敗:", error);
    }
  }

  document.querySelectorAll(".link-preview").forEach(async (anchor) => {
    await fetchOGData(anchor.href, anchor);
  });
</script>
