      .posts {

      }
    
      .post {
        border: 1px solid #ddd;
        border-radius: 8px;

        transition: transform 0.3s ease;
        background-color: white;
        width: 100%;
        max-width: 360px;
        display: flex;

        justify-content: space-between;
      }
    
      .post img {

        height: 270px;

      }
    
      .post a {

      .post h3 {

        font-size: 30px;
        color: black;

        overflow: hidden;

      .background-video {

        left: 0;

        height: 100%;

        z-index: -1;

      .box-section {

    <script>
      const worker = new Worker("searchWorker.js");

      const searchInput = document.getElementById("searchInput");
      const categoryFilter = document.getElementById("categoryFilter");
      const resultsDiv = document.getElementById("results");

      function runSearch() {
        worker.postMessage({
          query: searchInput.value,
          category: categoryFilter.value
        });
      }

      searchInput.addEventListener("input", runSearch);
      categoryFilter.addEventListener("change", runSearch);

      worker.onmessage = (e) => {
        const results = e.data;

        resultsDiv.innerHTML = results.map(article => `
          <div class="article-card">
            ${article.image ? `<img src="${article.image}" alt="${article.title}" class="thumb">` : ""}
            <h3><a href="${article.path}">${article.title}</a></h3>
            <p class="categories">${article.category.join(", ")}</p>
            <p class="excerpt">${article.content.slice(0, 120)}...</p>
          </div>
        `).join("");
      };
    </script>
