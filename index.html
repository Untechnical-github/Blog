<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Untechnical Blog</title>
  <link rel="icon" href="profile.ico" type="image/x-icon">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #fff;
      color: #000;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #000;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      z-index: 1000;
    }
    header .logo {
      font-size: 24px;
      font-weight: bold;
    }
    main {
      margin-top: 80px;
      text-align: center;
    }
    .hero {
      width: 100%;
      height: 80vh;
      background-image: url('hero.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }
    .hero h1 {
      font-size: 48px;
      margin: 0;
    }
    .posts {
      margin: 40px auto;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 0 20px;
    }
    .post {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .post:hover {
      transform: translateY(-10px);
    }
    .post img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .post h3 {
      margin: 15px;
      font-size: 18px;
    }
    .post p {
      margin: 0 15px 15px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <a href="index.html">Untechnical</a>
  </div>
</header>
<main>
  <div class="hero">
    <h1>Discover the Untechnical World</h1>
  </div>
  <section class="posts">
    <div class="post">
      <a href ="1.html">
      <img src="image.jpg" alt="Post 1">
      <h3>iPhone･Androidスマホのシャッター音を消す方法</h3>
      </a>
    </div>
  </section>
</main>
</body>
</html>
