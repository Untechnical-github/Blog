    <script>
      const worker = new Worker("script/search-worker.js");
      const searchInput = document.getElementById("searchBar");
      const categorySelect = document.getElementById("categoryFilter");
      const postSection = document.getElementById("postSection");
      let allArticles = [];

      function displayArticles(articles, keyword) {
        if (!articles || articles.length === 0) {
          postSection.innerHTML = "<p>該当する記事はありません。</p>";
          return;
        }

        postSection.innerHTML = articles.map(article => {
          let contextHTML = '';

          if (keyword && keyword.length > 0) {
            const lowerContent = article.content.toLowerCase();
            const index = lowerContent.indexOf(keyword);

            if (index !== -1) {

              const startIndex = Math.max(0, index - 30);
              const endIndex = Math.min(article.content.length, index + keyword.length + 30);
              let snippet = article.content.substring(startIndex, endIndex);

              if (startIndex > 0) snippet = '...' + snippet;
              if (endIndex < article.content.length) snippet = snippet + '...';

              const regex = new RegExp(keyword, 'gi');
              contextHTML = snippet.replace(regex, '<strong>$&</strong>');

            } else {

              contextHTML = article.content.slice(0, 80) + '...';
            }
          } else {

            contextHTML = article.content.slice(0, 80) + '...';
          }

          return `
            <div class="post">
              <a href="${article.path}">
                <img src="${article.image}" alt="${article.title}">
                <h3>${article.title}</h3>
                <p class="context">${contextHTML}</p>
              </a>
            </div>
          `;
        }).join("");
      }


      fetch("articles.json")
        .then(res => res.json())
        .then(data => {
          allArticles = data;
  
          displayArticles(allArticles, "");
          worker.postMessage({ type: "load", payload: data });
        });

      function performSearch() {
        const keyword = searchInput.value.trim().toLowerCase();
        const category = categorySelect.value;

        if (keyword === "" && category === "") {

          displayArticles(allArticles, "");
        } else {
          worker.postMessage({ type: "search", payload: { keyword, category } });
        }
      }

      searchInput.addEventListener("input", performSearch);
      categorySelect.addEventListener("change", performSearch);

      worker.onmessage = function (e) {
        const results = e.data;
        const keyword = searchInput.value.trim().toLowerCase();

        displayArticles(results, keyword);
      };
    </script>
